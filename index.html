<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="navbar">
  <div class="navbar-logo">
    <img src="assets/images/logo.svg" alt="Weather Now logo" height="28" />
  </div>

  <div class="units-dropdown">
    <button class="units-btn" id="unitsBtn">
      <img src="assets/images/icon-units.svg" alt="units" height="14" />
      Units
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
  </div>
</header>
</div>
</section>
  <main class="container">
    <h1>How's the sky looking today?</h1>

    <div class="search-wrap">
      <div class="search-row">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            id="cityInput"
            placeholder="Search for a place..."
            autocomplete="off"
            spellcheck="false"
          />
          <div class="loader" id="loader"></div>
        </div>
        <button id="searchBtn">Search</button>
      </div>

      <!-- Dropdown results -->
      <div class="dropdown" id="dropdown">
        <ul class="results-list" id="resultsList" role="listbox"></ul>
      </div>
    </div>

    <!-- Empty state -->
    <p class="no-results-msg" id="noResults"></p>
    <!-- Tarjeta principal del clima -->
    <section class="weather-card">
      <div class="weather-card-left">
        <h2 class="weather-city">Berlin, Germany</h2>
        <p class="weather-date">Tuesday, Aug 5, 2025</p>
      </div>
      <div class="weather-card-right">
        <img src="assets/images/icon-sunny.webp" alt="Sunny" class="weather-icon" />
        <p class="weather-temp">68°</p>
      </div>
    </section>
    <!-- ── Daily Forecast ── -->
    <section class="forecast-widget">
      <h2 class="forecast-title">Daily forecast</h2>
 
      <!-- Loaded state -->
      <div class="forecast-grid" id="forecastGrid">
        <!-- JS populates this -->
      </div>
 
      <!-- Loading skeleton (shown while fetching, hidden by JS once ready) -->
      <div class="forecast-grid forecast-grid--skeleton" id="forecastSkeleton" aria-hidden="true">
        <div class="forecast-card"><div class="skeleton sk-day"></div><div class="skeleton sk-icon"></div><div class="sk-temps"><div class="skeleton sk-high"></div><div class="skeleton sk-low"></div></div></div>
        <div class="forecast-card"><div class="skeleton sk-day"></div><div class="skeleton sk-icon"></div><div class="sk-temps"><div class="skeleton sk-high"></div><div class="skeleton sk-low"></div></div></div>
        <div class="forecast-card"><div class="skeleton sk-day"></div><div class="skeleton sk-icon"></div><div class="sk-temps"><div class="skeleton sk-high"></div><div class="skeleton sk-low"></div></div></div>
        <div class="forecast-card"><div class="skeleton sk-day"></div><div class="skeleton sk-icon"></div><div class="sk-temps"><div class="skeleton sk-high"></div><div class="skeleton sk-low"></div></div></div>
        <div class="forecast-card"><div class="skeleton sk-day"></div><div class="skeleton sk-icon"></div><div class="sk-temps"><div class="skeleton sk-high"></div><div class="skeleton sk-low"></div></div></div>
        <div class="forecast-card"><div class="skeleton sk-day"></div><div class="skeleton sk-icon"></div><div class="sk-temps"><div class="skeleton sk-high"></div><div class="skeleton sk-low"></div></div></div>
        <div class="forecast-card"><div class="skeleton sk-day"></div><div class="skeleton sk-icon"></div><div class="sk-temps"><div class="skeleton sk-high"></div><div class="skeleton sk-low"></div></div></div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
